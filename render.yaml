# Render Blueprint – Trade Opportunities API
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: trade-opportunities-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # You must set this manually in the Render dashboard
      - key: AUTH_TOKEN
        sync: false  # You must set this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.6
